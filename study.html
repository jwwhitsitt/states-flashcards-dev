<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Week 7</title>

  <!-- Kitimus preload (prevents flicker) -->
  <link rel="preload" as="image" href="/mascots/kitimus/kitimus-neutral.png">
  <link rel="preload" as="image" href="/mascots/kitimus/kitimus-blink.png">

  <style>
    :root{
      --bg:#f4f6fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --shadow:0 10px 30px rgba(15,23,42,.12);
      --radius:18px;
      --link:#1d4ed8;
      --btn:#0f172a;
      --btnText:#ffffff;
      --btn2:#e5e7eb;
      --btn2text:#111827;
      --pad: 12px;
      --gap: 10px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    header{
      padding:10px 14px;
      background:#fff;
      box-shadow:0 1px 10px rgba(0,0,0,.06);
      display:flex;
      align-items:center;
      gap:10px;
    }
    header a{
      text-decoration:none;
      color:var(--link);
      font-weight:900;
      white-space:nowrap;
    }
    header h1{
      margin:0;
      font-size:18px;
      font-weight:1000;
      letter-spacing:.2px;
      flex:1 1 auto;
      text-align:center;
    }
    .wrap{max-width:780px;margin:0 auto;padding:16px}
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }
    .grid{
      display:grid;
      gap:12px;
      margin-top:12px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:0;
      background:var(--btn);
      color:var(--btnText);
      font-weight:1000;
      text-decoration:none;
      cursor:pointer;
    }
    .btn.secondary{
      background:var(--btn2);
      color:var(--btn2text);
    }
    .list{
      margin:10px 0 0;
      padding-left:18px;
      color:var(--muted);
      line-height:1.45;
    }
    .mascot{
      width:56px;height:56px;flex:0 0 auto;
    }
    .left{
      display:flex;align-items:center;gap:10px;min-width:120px;
    }
    .right{min-width:120px;text-align:right}
  </style>
</head>
<body>
  <header>
    <div class="left">
      <a href="https://kitimus.com/">Home</a>
    </div>
    <h1>Week 7</h1>
    <div class="right">
      <img class="mascot" src="/mascots/kitimus/kitimus-neutral.png" alt="Kitimus">
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <div style="font-weight:1000;">This week’s states</div>
      <ul class="list">
        <li>North Dakota (ND) — Bismarck</li>
        <li>South Dakota (SD) — Pierre</li>
        <li>Nebraska (NE) — Lincoln</li>
        <li>Kansas (KS) — Topeka</li>
      </ul>

      <div class="grid">
        <a class="btn" href="./study.html">Study (Flashcards)</a>
        <a class="btn secondary" href="./test.html">Test (Check Your Learning)</a>
        <a class="btn secondary" href="./boss.html">Boss Battle (Abbreviations)</a>
      </div>
    </div>
  </div>

  <script>
    // tiny blink to keep mascot lively without changing layout
    const img = document.querySelector(".mascot");
    let t = 0;
    setInterval(() => {
      t++;
      if(t % 8 === 0){
        img.src = "/mascots/kitimus/kitimus-blink.png";
        setTimeout(() => img.src="/mascots/kitimus/kitimus-neutral.png", 140);
      }
    }, 900);
  </script>
</body>
</html>
